name: "Destroy GCP ADSP Use-Case 1"

on:
  push:
    branches:
      - destroy-adsp-uc1

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_CLI_ARGS: "-no-color"

jobs:

  #--------------------------------------------------------------
  # Precheck: verify state bucket exists before attempting destroy
  #--------------------------------------------------------------
  precheck_state_bucket:
    name: "Precheck: State bucket exists?"
    runs-on: ubuntu-latest
    outputs:
      bucket_exists: ${{ steps.check.outputs.bucket_exists }}
      tf_state_bucket: ${{ steps.env.outputs.tf_state_bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load common config + derive bucket
        id: env
        shell: bash
        run: |
          set -euo pipefail
          COMMON_JSON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          PROJECT_PREFIX="$(jq -r .project_prefix "$COMMON_JSON")"
          TF_STATE_BUCKET="${PROJECT_PREFIX}-state-bucket"
          echo "tf_state_bucket=${TF_STATE_BUCKET}" >> "$GITHUB_OUTPUT"

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Check bucket exists
        id: check
        run: |
          set -euo pipefail
          TF_STATE_BUCKET="${{ steps.env.outputs.tf_state_bucket }}"
          if gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" >/dev/null 2>&1; then
            echo "bucket_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "bucket_exists=false" >> "$GITHUB_OUTPUT"
          fi

  #--------------------------------------------------------------
  # Destroy order: XC → BIG-IP Base → Compute → Infra → Bucket
  #--------------------------------------------------------------
  terraform_xc_destroy:
    name: "Destroy: F5 XC"
    if: needs.precheck_state_bucket.outputs.bucket_exists == 'true'
    runs-on: ubuntu-latest
    needs: precheck_state_bucket
    defaults:
      run:
        working-directory: ./f5/xc
    env:
      TF_STATE_BUCKET: ${{ needs.precheck_state_bucket.outputs.tf_state_bucket }}
      VES_P12_CONTENT: ${{ secrets.VES_P12_CONTENT }}
      VES_P12_PASSWORD: ${{ secrets.VES_P12_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write /tmp/xc.tfvars.json
        shell: bash
        run: |
          set -euo pipefail
          COMMON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          UC_XC="$GITHUB_WORKSPACE/config/uc1/xc/env.json"

          jq -s '.[0] * .[1] | {
            gcp_project_id: .gcp_project_id,
            gcp_region: .gcp_region,

            tf_state_bucket: "'"${TF_STATE_BUCKET}"'",
            infra_state_prefix: "state/infra",
            bigip_state_prefix: "state/bigip-base",

            xc_tenant: .xc_base.xc_tenant,
            api_url: .xc_base.api_url,
            xc_namespace: .xc_base.xc_namespace,
            app_domain: .xc_base.app_domain,

            origin_server: (.xc_base.origin_server // ""),
            origin_port: ( .xc_base.origin_port | tostring ),

            backend_bigip: (.xc_base.backend_bigip // true),

            xc_waf_blocking: (.xc_base.xc_waf_blocking // false),

            xc_app_type: (.xc_base.xc_app_type // []),
            xc_multi_lb: (.xc_base.xc_multi_lb // false),

            xc_api_disc: (.xc_features.xc_api_disc // false),
            xc_api_pro: (.xc_features.xc_api_pro // false),
            xc_api_spec: (.xc_features.xc_api_spec // null),
            xc_api_val: (.xc_features.xc_api_val // false),
            xc_api_val_all: (.xc_features.xc_api_val_all // false),
            xc_api_val_active: (.xc_features.xc_api_val_active // false),
            xc_resp_val_active: (.xc_features.xc_resp_val_active // false),
            xc_api_val_custom: (.xc_features.xc_api_val_custom // false),

            enforcement_block: (.xc_features.enforcement_block // false),
            enforcement_report: (.xc_features.enforcement_report // false),
            fall_through_mode_allow: (.xc_features.fall_through_mode_allow // false),

            xc_jwt_val: (.xc_features.xc_jwt_val // false),
            jwt_val_block: (.xc_features.jwt_val_block // false),
            jwt_val_report: (.xc_features.jwt_val_report // false),
            jwks: (.xc_features.jwks // "app_domain"),
            iss_claim: (.xc_features.iss_claim // false),
            aud_claim: (.xc_features.aud_claim // [""]),
            exp_claim: (.xc_features.exp_claim // false),

            xc_bot_def: (.xc_features.xc_bot_def // false),
            xc_ddos_pro: (.xc_features.xc_ddos_pro // false),
            xc_mud: (.xc_features.xc_mud // false),
            xc_data_guard: (.xc_features.xc_data_guard // false)
          }' "$COMMON" "$UC_XC" > /tmp/xc.tfvars.json

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (GCS backend)
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=state/xc"

      - name: Terraform Plan (destroy)
        run: terraform plan -destroy -no-color -input=false -var-file=/tmp/xc.tfvars.json

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var-file=/tmp/xc.tfvars.json

  terraform_bigip_base_destroy:
    name: "Destroy: BIG-IP Base"
    if: needs.precheck_state_bucket.outputs.bucket_exists == 'true'
    runs-on: ubuntu-latest
    needs: [precheck_state_bucket, terraform_xc_destroy]
    defaults:
      run:
        working-directory: ./f5/bigip-base/gcp
    env:
      TF_STATE_BUCKET: ${{ needs.precheck_state_bucket.outputs.tf_state_bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write /tmp/bigip-base.tfvars.json
        shell: bash
        run: |
          set -euo pipefail
          COMMON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          UC_GCP="$GITHUB_WORKSPACE/config/uc1/gcp/env.json"

          jq -s '.[0] * .[1] | {
            gcp_project_id,
            gcp_region,
            gcp_zone,

            tf_state_bucket: "'"${TF_STATE_BUCKET}"'",
            infra_state_prefix: "state/infra",
            bigip_config_state_prefix: "state/bigip-config",

            gcp_runtime_service_account_email: .compute.gcp_runtime_service_account_email,

            image_name: .bigip_base.image_name,
            machine_type: (.bigip_base.machine_type // "n2-highmem-4"),
            min_cpu_platform: (.bigip_base.min_cpu_platform // "Intel Cascade Lake"),
            disk_type: (.bigip_base.disk_type // "pd-ssd"),
            disk_size_gb: (.bigip_base.disk_size_gb // 120),

            f5_username: (.bigip_base.f5_username // "admin"),

            nic_count: (.bigip_base.nic_count // "true"),
            asm: (.bigip_base.asm // "none"),
            apm: (.bigip_base.apm // "none")
          }' "$COMMON" "$UC_GCP" > /tmp/bigip-base.tfvars.json

      - name: Resolve SSH public key file
        shell: bash
        env:
          SSH_PUB: ${{ secrets.SSH_PUB }}
        run: |
          set -euo pipefail
          KEY_FILE="$GITHUB_WORKSPACE/config/common/ssh/demo_bigip.pub"
          if [[ -f "$KEY_FILE" ]]; then
            echo "Using committed demo public key"
          else
            if [[ -z "${SSH_PUB:-}" ]]; then
              echo "::error::No public key found: config/common/ssh/demo_bigip.pub missing and SSH_PUB secret is empty"
              exit 1
            fi
            echo "Committed key not found; writing from SSH_PUB secret"
            KEY_FILE="$GITHUB_WORKSPACE/.generated/ssh_pub.pub"
            mkdir -p "$(dirname "$KEY_FILE")"
            printf '%s' "$SSH_PUB" > "$KEY_FILE"
            chmod 644 "$KEY_FILE"
          fi
          echo "TF_VAR_f5_ssh_publickey=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (GCS backend)
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=state/bigip-base"

      - name: Terraform Plan (destroy)
        run: terraform plan -destroy -no-color -input=false -var-file=/tmp/bigip-base.tfvars.json

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var-file=/tmp/bigip-base.tfvars.json

  terraform_compute_destroy:
    name: "Destroy: Compute"
    if: needs.precheck_state_bucket.outputs.bucket_exists == 'true'
    runs-on: ubuntu-latest
    needs: [precheck_state_bucket, terraform_bigip_base_destroy]
    defaults:
      run:
        working-directory: ./compute/gcp
    env:
      TF_STATE_BUCKET: ${{ needs.precheck_state_bucket.outputs.tf_state_bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write /tmp/compute.tfvars.json
        shell: bash
        run: |
          set -euo pipefail
          COMMON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          UC_GCP="$GITHUB_WORKSPACE/config/uc1/gcp/env.json"

          jq -s '.[0] * .[1] | {
            gcp_project_id,
            gcp_region,
            gcp_zone,

            tf_state_bucket: "'"${TF_STATE_BUCKET}"'",
            infra_state_prefix: "state/infra",

            gcp_runtime_service_account_email: .compute.gcp_runtime_service_account_email,

            machine_type: (.compute.machine_type // "e2-micro"),
            boot_disk_gb: (.compute.boot_disk_gb // 10),
            assign_public_ip: (.compute.assign_public_ip // true),
            enable_oslogin: (.compute.enable_oslogin // false),
            install_docker_compose: (.compute.install_docker_compose // true),

            vm_create_crapi: (.compute.vm_create_crapi // false),
            vm_create_juice_shop: (.compute.vm_create_juice_shop // false)
          }' "$COMMON" "$UC_GCP" > /tmp/compute.tfvars.json

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (GCS backend)
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=state/compute"

      - name: Terraform Plan (destroy)
        run: terraform plan -destroy -no-color -input=false -var-file=/tmp/compute.tfvars.json

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var-file=/tmp/compute.tfvars.json

  terraform_infra_destroy:
    name: "Destroy: Infra"
    if: needs.precheck_state_bucket.outputs.bucket_exists == 'true'
    runs-on: ubuntu-latest
    needs: [precheck_state_bucket, terraform_compute_destroy]
    defaults:
      run:
        working-directory: ./infra/gcp
    env:
      TF_STATE_BUCKET: ${{ needs.precheck_state_bucket.outputs.tf_state_bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write /tmp/infra.tfvars.json
        shell: bash
        run: |
          set -euo pipefail
          COMMON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          UC_GCP="$GITHUB_WORKSPACE/config/uc1/gcp/env.json"

          jq -s '.[0] * .[1] | {
            gcp_project_id,
            gcp_region,
            project_prefix,
            resource_owner,
            admin_src_addr,

            nap: ( .features.nap // false ),
            nic: ( .features.nginx_ingress_controller // false ),
            bigip: ( .features.bigip // false ),
            "bigip_cis": ( .features.bigip_cis // false )
          }' "$COMMON" "$UC_GCP" > /tmp/infra.tfvars.json

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (GCS backend)
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=state/infra"

      - name: Terraform Plan (destroy)
        run: terraform plan -destroy -no-color -input=false -var-file=/tmp/infra.tfvars.json

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var-file=/tmp/infra.tfvars.json

  delete_state_bucket:
    name: "Delete State Bucket"
    if: needs.precheck_state_bucket.outputs.bucket_exists == 'true'
    runs-on: ubuntu-latest
    needs: [precheck_state_bucket, terraform_infra_destroy]
    env:
      TF_STATE_BUCKET: ${{ needs.precheck_state_bucket.outputs.tf_state_bucket }}

    steps:
      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete state bucket (contents + bucket)
        shell: bash
        run: |
          set -euo pipefail

          BUCKET="gs://${TF_STATE_BUCKET}"

          if gcloud storage buckets describe "$BUCKET" >/dev/null 2>&1; then
            echo "Deleting bucket + all contents: $BUCKET"
            gcloud storage rm -r "$BUCKET" || true

            # In case of timing/parallelism, treat 404 as success
            if gcloud storage buckets describe "$BUCKET" >/dev/null 2>&1; then
              echo "Bucket still exists after rm -r; deleting explicitly."
              gcloud storage buckets delete "$BUCKET" || true
            else
              echo "Bucket already deleted."
            fi
          else
            echo "Bucket not found (already deleted): $BUCKET"
          fi

