name: "Deploy GCP ADSP Use-Case 3"

on:
  push:
    branches:
      - deploy-adsp-uc3
      - test-adsp-uc3

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_CLI_ARGS: "-no-color"

jobs:
  bootstrap_state_bucket:
    name: "Bootstrap: GCS state bucket"
    runs-on: ubuntu-latest
    outputs:
      tf_state_bucket: ${{ steps.out.outputs.tf_state_bucket }}
      gcp_project_id: ${{ steps.out.outputs.gcp_project_id }}
      gcp_region: ${{ steps.out.outputs.gcp_region }}
      gcp_zone: ${{ steps.out.outputs.gcp_zone }}
      project_prefix: ${{ steps.out.outputs.project_prefix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read common config + derive bucket
        id: out
        shell: bash
        run: |
          set -euo pipefail
          COMMON_JSON="$GITHUB_WORKSPACE/config/common/gcp/env.json"

          GCP_PROJECT_ID="$(jq -r .gcp_project_id "$COMMON_JSON")"
          GCP_REGION="$(jq -r .gcp_region "$COMMON_JSON")"
          GCP_ZONE="$(jq -r .gcp_zone "$COMMON_JSON")"
          PROJECT_PREFIX="$(jq -r .project_prefix "$COMMON_JSON")"

          TF_STATE_BUCKET="${PROJECT_PREFIX}-state-bucket"

          echo "gcp_project_id=${GCP_PROJECT_ID}" >> "$GITHUB_OUTPUT"
          echo "gcp_region=${GCP_REGION}" >> "$GITHUB_OUTPUT"
          echo "gcp_zone=${GCP_ZONE}" >> "$GITHUB_OUTPUT"
          echo "project_prefix=${PROJECT_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "tf_state_bucket=${TF_STATE_BUCKET}" >> "$GITHUB_OUTPUT"

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Ensure state bucket exists + settings
        shell: bash
        env:
          TF_STATE_BUCKET: ${{ steps.out.outputs.tf_state_bucket }}
          GCP_REGION: ${{ steps.out.outputs.gcp_region }}
        run: |
          set -euo pipefail

          if gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" >/dev/null 2>&1; then
            echo "State bucket exists: ${TF_STATE_BUCKET}"
          else
            echo "Creating state bucket: ${TF_STATE_BUCKET}"
            gcloud storage buckets create "gs://${TF_STATE_BUCKET}" \
              --location="${GCP_REGION}" \
              --uniform-bucket-level-access
          fi

          gcloud storage buckets update "gs://${TF_STATE_BUCKET}" \
            --versioning \
            --public-access-prevention

  terraform_infra:
    name: "Terraform: Infra"
    runs-on: ubuntu-latest
    needs: bootstrap_state_bucket
    defaults:
      run:
        working-directory: ./infra/gcp
    env:
      TF_STATE_BUCKET: ${{ needs.bootstrap_state_bucket.outputs.tf_state_bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Write /tmp/infra.tfvars.json
        shell: bash
        run: |
          set -euo pipefail
          COMMON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          UC_GCP="$GITHUB_WORKSPACE/config/uc3/gcp/env.json"

          jq -s '.[0] * .[1] | {
            gcp_project_id,
            gcp_region,
            project_prefix,
            resource_owner,
            admin_src_addr,

            # feature flags expected by infra variables.tf
            nap: ( .features.nap // false ),
            nic: ( .features.nginx_ingress_controller // false ),
            bigip: ( .features.bigip // false ),
            "bigip_cis": ( .features.bigip_cis // false )
          }' "$COMMON" "$UC_GCP" > /tmp/infra.tfvars.json

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (GCS backend)
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=state/uc3/infra"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        if: github.ref == 'refs/heads/deploy-adsp-uc3'
        run: terraform plan -no-color -input=false -var-file=/tmp/infra.tfvars.json

      - name: Terraform Apply
        if: github.ref == 'refs/heads/deploy-adsp-uc3'
        run: terraform apply -auto-approve -input=false -var-file=/tmp/infra.tfvars.json

  terraform_compute:
    name: "Terraform: Compute"
    runs-on: ubuntu-latest
    needs: [bootstrap_state_bucket, terraform_infra]
    defaults:
      run:
        working-directory: ./compute/gcp
    env:
      TF_STATE_BUCKET: ${{ needs.bootstrap_state_bucket.outputs.tf_state_bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Write /tmp/compute.tfvars.json
        shell: bash
        run: |
          set -euo pipefail
          COMMON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          UC_GCP="$GITHUB_WORKSPACE/config/uc3/gcp/env.json"

          jq -s '.[0] * .[1] | {
            gcp_project_id,
            gcp_region,
            gcp_zone,

            tf_state_bucket: "'"${TF_STATE_BUCKET}"'",
            infra_state_prefix: "state/uc3/infra",

            gcp_runtime_service_account_email: .compute.gcp_runtime_service_account_email,

            machine_type: (.compute.machine_type // "e2-medium"),
            boot_disk_gb: (.compute.boot_disk_gb // 20),
            assign_public_ip: (.compute.assign_public_ip // false),
            enable_oslogin: (.compute.enable_oslogin // false),
            install_docker_compose: (.compute.install_docker_compose // true),

            vm_create_comfy_capybara: (.compute.vm_create_comfy_capybara // false),
            vm_create_asle: (.compute.vm_create_asle // false),
            comfy_compose_artifact: (.compute.comfy_compose_artifact // "ghcr.io/knowbase/comfy-capybara-compose"),
            comfy_compose_tag: (.compute.comfy_compose_tag // "0.3.0"),
            asle_tarball_gcs_uri: (.compute.asle_tarball_gcs_uri // ""),
            asle_image_ref: (.compute.asle_image_ref // ""),
            asle_management_port: (.compute.asle_management_port // 8000),
            asle_telemetry_port: (.compute.asle_telemetry_port // 0),
            asle_config_bundle_gcs_uri: ("gs://" + "'"${TF_STATE_BUCKET}"'" + "/artifacts/uc3/asle/bundle.json"),
            asle_poller_image: (.compute.asle_poller_image // "google/cloud-sdk:slim"),
            asle_poller_interval_seconds: (.compute.asle_poller_interval_seconds // 30),
            asle_machine_type: (.compute.asle_machine_type // "e2-custom-2-4096"),
            asle_boot_disk_gb: (.compute.asle_boot_disk_gb // 30)
          }' "$COMMON" "$UC_GCP" > /tmp/compute.tfvars.json

      - name: Resolve SSH public key for compute
        shell: bash
        env:
          SSH_PUB: ${{ secrets.SSH_PUB }}
        run: |
          set -euo pipefail
          COMMITTED_KEY="$GITHUB_WORKSPACE/config/common/ssh/demo_bigip.pub"

          if [[ -n "${SSH_PUB:-}" ]]; then
            echo "Using SSH_PUB secret for compute SSH access"
            printf '%s\n' "$SSH_PUB" | sed 's/\r$//' > /tmp/ssh_pub
            chmod 600 /tmp/ssh_pub
          elif [[ -f "$COMMITTED_KEY" ]]; then
            echo "Using committed key for compute SSH access"
            cp "$COMMITTED_KEY" /tmp/ssh_pub
            chmod 600 /tmp/ssh_pub
          else
            echo "No SSH_PUB provided; compute VMs will use generated key only"
          fi

          if [[ -f /tmp/ssh_pub ]]; then
            DELIM="EOFKEY_$(date +%s%N)"
            {
              echo "TF_VAR_ssh_pub<<$DELIM"
              cat /tmp/ssh_pub
              echo "$DELIM"
            } >> "$GITHUB_ENV"
          fi

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (GCS backend)
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=state/uc3/compute"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        if: github.ref == 'refs/heads/deploy-adsp-uc3'
        run: terraform plan -no-color -input=false -var-file=/tmp/compute.tfvars.json

      - name: Terraform Apply
        if: github.ref == 'refs/heads/deploy-adsp-uc3'
        run: terraform apply -auto-approve -input=false -var-file=/tmp/compute.tfvars.json

  terraform_bigip_config:
    name: "Terraform: BIG-IP Config"
    runs-on: ubuntu-latest
    needs: [bootstrap_state_bucket, terraform_compute, terraform_bigip_base]
    defaults:
      run:
        working-directory: ./f5/bigip-config/gcp
    env:
      TF_STATE_BUCKET: ${{ needs.bootstrap_state_bucket.outputs.tf_state_bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Write /tmp/bigip-config.tfvars.json
        shell: bash
        run: |
          set -euo pipefail
          COMMON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          UC_GCP="$GITHUB_WORKSPACE/config/uc3/gcp/env.json"

          jq -s '.[0] * .[1] | {
            gcp_project_id,
            gcp_region,

            tf_state_bucket: "'"${TF_STATE_BUCKET}"'",
            infra_state_prefix: "state/uc3/infra",
            compute_state_prefix: "state/uc3/compute",
            bigip_base_state_prefix: "state/uc3/bigip-base",

            backend_compute: (.bigip_config.backend_compute // true),
            backend_bigip_base: (.bigip_config.backend_bigip_base // true),

            awaf_config_payload: (.bigip_config.awaf_config_payload // "../config/uc3-config.json.tftpl"),
            app_server_ip: (.bigip_config.app_server_ip // ""),
            app_server_port: (.bigip_config.app_server_port // 8080),
            api_server_port: (.bigip_config.api_server_port // 8000),
            asle_telemetry_port: (.compute.asle_telemetry_port // 0),
            self_signed_cert_cn: (.bigip_config.self_signed_cert_cn // "bigip-front-door"),

            as3_gcs_path: "artifacts/uc3/as3/uc3-declaration.json"
          }' "$COMMON" "$UC_GCP" > /tmp/bigip-config.tfvars.json

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (GCS backend)
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=state/uc3/bigip-config"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        if: github.ref == 'refs/heads/deploy-adsp-uc3'
        run: terraform plan -no-color -input=false -var-file=/tmp/bigip-config.tfvars.json

      - name: Terraform Apply
        if: github.ref == 'refs/heads/deploy-adsp-uc3'
        run: terraform apply -auto-approve -input=false -var-file=/tmp/bigip-config.tfvars.json

  terraform_bigip_base:
    name: "Terraform: BIG-IP Base"
    runs-on: ubuntu-latest
    needs: [bootstrap_state_bucket, terraform_infra]
    defaults:
      run:
        working-directory: ./f5/bigip-base/gcp
    env:
      TF_STATE_BUCKET: ${{ needs.bootstrap_state_bucket.outputs.tf_state_bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Write /tmp/bigip-base.tfvars.json
        shell: bash
        run: |
          set -euo pipefail
          COMMON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          UC_GCP="$GITHUB_WORKSPACE/config/uc3/gcp/env.json"

          AS3_GCS_URI="gs://${TF_STATE_BUCKET}/artifacts/uc3/as3/uc3-declaration.json"

          jq -s --arg as3_uri "$AS3_GCS_URI" '.[0] * .[1] | {
            gcp_project_id,
            gcp_region,
            gcp_zone,

            tf_state_bucket: "'"${TF_STATE_BUCKET}"'",
            infra_state_prefix: "state/uc3/infra",
            as3_gcs_uri: $as3_uri,

            gcp_runtime_service_account_email: .compute.gcp_runtime_service_account_email,

            image_name: .bigip_base.image_name,
            machine_type: (.bigip_base.machine_type // "n2-highmem-4"),
            min_cpu_platform: (.bigip_base.min_cpu_platform // "Intel Cascade Lake"),
            disk_type: (.bigip_base.disk_type // "pd-ssd"),
            disk_size_gb: (.bigip_base.disk_size_gb // 120),

            f5_username: (.bigip_base.f5_username // "admin"),

            nic_count: (.bigip_base.nic_count // "true"),
            asm: (.bigip_base.asm // "none"),
            apm: (.bigip_base.apm // "none")
          }' "$COMMON" "$UC_GCP" > /tmp/bigip-base.tfvars.json

      - name: Resolve SSH public key file
        shell: bash
        env:
          SSH_PUB: ${{ secrets.SSH_PUB }}
        run: |
          set -euo pipefail
          KEY_FILE="$GITHUB_WORKSPACE/config/common/ssh/demo_bigip.pub"
          if [[ -f "$KEY_FILE" ]]; then
            echo "Using committed demo public key"
          else
            if [[ -z "${SSH_PUB:-}" ]]; then
              echo "::error::No public key found: config/common/ssh/demo_bigip.pub missing and SSH_PUB secret is empty"
              exit 1
            fi
            echo "Committed key not found; writing from SSH_PUB secret"
            KEY_FILE="$GITHUB_WORKSPACE/.generated/ssh_pub.pub"
            mkdir -p "$(dirname "$KEY_FILE")"
            printf '%s\n' "$SSH_PUB" | sed 's/\r$//' > "$KEY_FILE"
            chmod 644 "$KEY_FILE"
          fi
          echo "TF_VAR_f5_ssh_publickey=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (GCS backend)
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=state/uc3/bigip-base"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        if: github.ref == 'refs/heads/deploy-adsp-uc3'
        run: terraform plan -no-color -input=false -var-file=/tmp/bigip-base.tfvars.json

      - name: Terraform Apply
        if: github.ref == 'refs/heads/deploy-adsp-uc3'
        run: terraform apply -auto-approve -input=false -var-file=/tmp/bigip-base.tfvars.json

  terraform_asle_config:
    name: "Terraform: ASLE Config"
    runs-on: ubuntu-latest
    needs: [bootstrap_state_bucket, terraform_bigip_base]
    defaults:
      run:
        working-directory: ./f5/asle-config/gcp
    env:
      TF_STATE_BUCKET: ${{ needs.bootstrap_state_bucket.outputs.tf_state_bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Write /tmp/asle-config.tfvars.json
        shell: bash
        run: |
          set -euo pipefail
          COMMON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          UC_GCP="$GITHUB_WORKSPACE/config/uc3/gcp/env.json"

          jq -s '.[0] * .[1] | {
            gcp_project_id,
            gcp_region,

            tf_state_bucket: "'"${TF_STATE_BUCKET}"'",
            infra_state_prefix: "state/uc3/infra",
            bigip_base_state_prefix: "state/uc3/bigip-base",

            bundle_gcs_path: "artifacts/uc3/asle/bundle.json",

            bigip_onboard_name: (.asle_config.bigip_onboard_name // "uc3-bigip"),
            bigip_onboard_port: (.asle_config.bigip_onboard_port // "443"),
            bigip_onboard_user: (.asle_config.bigip_onboard_user // "admin")
          }' "$COMMON" "$UC_GCP" > /tmp/asle-config.tfvars.json

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (GCS backend)
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=state/uc3/asle-config"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        if: github.ref == 'refs/heads/deploy-adsp-uc3'
        run: terraform plan -no-color -input=false -var-file=/tmp/asle-config.tfvars.json

      - name: Terraform Apply
        if: github.ref == 'refs/heads/deploy-adsp-uc3'
        run: terraform apply -auto-approve -input=false -var-file=/tmp/asle-config.tfvars.json
