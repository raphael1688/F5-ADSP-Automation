name: "Destroy GCP ADSP Use-Case 3"

on:
  push:
    branches:
      - destroy-adsp-uc3

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_CLI_ARGS: "-no-color"

jobs:

  #--------------------------------------------------------------
  # Precheck: verify state bucket exists before attempting destroy
  #--------------------------------------------------------------
  precheck_state_bucket:
    name: "Precheck: State bucket exists?"
    runs-on: ubuntu-latest
    outputs:
      bucket_exists: ${{ steps.check.outputs.bucket_exists }}
      tf_state_bucket: ${{ steps.env.outputs.tf_state_bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Load common config + derive bucket
        id: env
        shell: bash
        run: |
          set -euo pipefail
          COMMON_JSON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          PROJECT_PREFIX="$(jq -r .project_prefix "$COMMON_JSON")"
          TF_STATE_BUCKET="${PROJECT_PREFIX}-state-bucket"
          echo "tf_state_bucket=${TF_STATE_BUCKET}" >> "$GITHUB_OUTPUT"

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Check bucket exists
        id: check
        run: |
          set -euo pipefail
          TF_STATE_BUCKET="${{ steps.env.outputs.tf_state_bucket }}"
          if gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" >/dev/null 2>&1; then
            echo "bucket_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "bucket_exists=false" >> "$GITHUB_OUTPUT"
          fi

  #--------------------------------------------------------------
  # Destroy order: (BIG-IP Base || Compute) → Infra → Bucket
  #--------------------------------------------------------------
  terraform_bigip_base_destroy:
    name: "Destroy: BIG-IP Base"
    if: needs.precheck_state_bucket.outputs.bucket_exists == 'true'
    runs-on: ubuntu-latest
    needs: precheck_state_bucket
    defaults:
      run:
        working-directory: ./f5/bigip-base/gcp
    env:
      TF_STATE_BUCKET: ${{ needs.precheck_state_bucket.outputs.tf_state_bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Write /tmp/bigip-base.tfvars.json
        shell: bash
        run: |
          set -euo pipefail
          COMMON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          UC_GCP="$GITHUB_WORKSPACE/config/uc3/gcp/env.json"

          AS3_GCS_URI="gs://${TF_STATE_BUCKET}/artifacts/uc3/as3/uc3-declaration.json"

          jq -s --arg as3_uri "$AS3_GCS_URI" '.[0] * .[1] | {
            gcp_project_id,
            gcp_region,
            gcp_zone,

            tf_state_bucket: "'"${TF_STATE_BUCKET}"'",
            infra_state_prefix: "state/uc3/infra",
            as3_gcs_uri: $as3_uri,

            gcp_runtime_service_account_email: .compute.gcp_runtime_service_account_email,

            image_name: .bigip_base.image_name,
            machine_type: (.bigip_base.machine_type // "n2-highmem-4"),
            min_cpu_platform: (.bigip_base.min_cpu_platform // "Intel Cascade Lake"),
            disk_type: (.bigip_base.disk_type // "pd-ssd"),
            disk_size_gb: (.bigip_base.disk_size_gb // 120),

            f5_username: (.bigip_base.f5_username // "admin"),

            nic_count: (.bigip_base.nic_count // "true"),
            asm: (.bigip_base.asm // "none"),
            apm: (.bigip_base.apm // "none")
          }' "$COMMON" "$UC_GCP" > /tmp/bigip-base.tfvars.json

      - name: Resolve SSH public key file
        shell: bash
        env:
          SSH_PUB: ${{ secrets.SSH_PUB }}
        run: |
          set -euo pipefail
          KEY_FILE="$GITHUB_WORKSPACE/config/common/ssh/demo_bigip.pub"
          if [[ -f "$KEY_FILE" ]]; then
            echo "Using committed demo public key"
          else
            if [[ -z "${SSH_PUB:-}" ]]; then
              echo "::error::No public key found: config/common/ssh/demo_bigip.pub missing and SSH_PUB secret is empty"
              exit 1
            fi
            echo "Committed key not found; writing from SSH_PUB secret"
            KEY_FILE="$GITHUB_WORKSPACE/.generated/ssh_pub.pub"
            mkdir -p "$(dirname "$KEY_FILE")"
            printf '%s' "$SSH_PUB" > "$KEY_FILE"
            chmod 644 "$KEY_FILE"
          fi
          echo "TF_VAR_f5_ssh_publickey=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (GCS backend)
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=state/uc3/bigip-base"

      - name: Terraform Plan (destroy)
        run: terraform plan -destroy -no-color -input=false -var-file=/tmp/bigip-base.tfvars.json

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var-file=/tmp/bigip-base.tfvars.json

  terraform_compute_destroy:
    name: "Destroy: Compute"
    if: needs.precheck_state_bucket.outputs.bucket_exists == 'true'
    runs-on: ubuntu-latest
    needs: precheck_state_bucket
    defaults:
      run:
        working-directory: ./compute/gcp
    env:
      TF_STATE_BUCKET: ${{ needs.precheck_state_bucket.outputs.tf_state_bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Write /tmp/compute.tfvars.json
        shell: bash
        run: |
          set -euo pipefail
          COMMON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          UC_GCP="$GITHUB_WORKSPACE/config/uc3/gcp/env.json"

          jq -s '.[0] * .[1] | {
            gcp_project_id,
            gcp_region,
            gcp_zone,

            tf_state_bucket: "'"${TF_STATE_BUCKET}"'",
            infra_state_prefix: "state/uc3/infra",

            gcp_runtime_service_account_email: .compute.gcp_runtime_service_account_email,

            machine_type: (.compute.machine_type // "e2-medium"),
            boot_disk_gb: (.compute.boot_disk_gb // 20),
            assign_public_ip: (.compute.assign_public_ip // false),
            enable_oslogin: (.compute.enable_oslogin // false),
            install_docker_compose: (.compute.install_docker_compose // true),

            vm_create_comfy_capybara: (.compute.vm_create_comfy_capybara // false),
            vm_create_asle: (.compute.vm_create_asle // false),
            comfy_compose_artifact: (.compute.comfy_compose_artifact // "ghcr.io/knowbase/comfy-capybara-compose"),
            comfy_compose_tag: (.compute.comfy_compose_tag // "0.3.0"),
            asle_tarball_gcs_uri: (.compute.asle_tarball_gcs_uri // ""),
            asle_image_ref: (.compute.asle_image_ref // ""),
            asle_management_port: (.compute.asle_management_port // 8000),
            asle_telemetry_port: (.compute.asle_telemetry_port // 0),
            asle_config_bundle_gcs_uri: ("gs://" + "'"${TF_STATE_BUCKET}"'" + "/artifacts/uc3/asle/bundle.json"),
            asle_poller_image: (.compute.asle_poller_image // "google/cloud-sdk:slim"),
            asle_poller_interval_seconds: (.compute.asle_poller_interval_seconds // 30),
            asle_machine_type: (.compute.asle_machine_type // "e2-custom-2-4096"),
            asle_boot_disk_gb: (.compute.asle_boot_disk_gb // 30)
          }' "$COMMON" "$UC_GCP" > /tmp/compute.tfvars.json

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (GCS backend)
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=state/uc3/compute"

      - name: Terraform Plan (destroy)
        run: terraform plan -destroy -no-color -input=false -var-file=/tmp/compute.tfvars.json

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var-file=/tmp/compute.tfvars.json

  terraform_infra_destroy:
    name: "Destroy: Infra"
    if: needs.precheck_state_bucket.outputs.bucket_exists == 'true'
    runs-on: ubuntu-latest
    needs: [precheck_state_bucket, terraform_compute_destroy, terraform_bigip_base_destroy]
    defaults:
      run:
        working-directory: ./infra/gcp
    env:
      TF_STATE_BUCKET: ${{ needs.precheck_state_bucket.outputs.tf_state_bucket }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Write /tmp/infra.tfvars.json
        shell: bash
        run: |
          set -euo pipefail
          COMMON="$GITHUB_WORKSPACE/config/common/gcp/env.json"
          UC_GCP="$GITHUB_WORKSPACE/config/uc3/gcp/env.json"

          jq -s '.[0] * .[1] | {
            gcp_project_id,
            gcp_region,
            project_prefix,
            resource_owner,
            admin_src_addr,

            nap: ( .features.nap // false ),
            nic: ( .features.nginx_ingress_controller // false ),
            bigip: ( .features.bigip // false ),
            "bigip_cis": ( .features.bigip_cis // false )
          }' "$COMMON" "$UC_GCP" > /tmp/infra.tfvars.json

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (GCS backend)
        shell: bash
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=state/uc3/infra"

      - name: Terraform Plan (destroy)
        run: terraform plan -destroy -no-color -input=false -var-file=/tmp/infra.tfvars.json

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var-file=/tmp/infra.tfvars.json

  delete_state_bucket:
    name: "Delete State Bucket"
    if: needs.precheck_state_bucket.outputs.bucket_exists == 'true'
    runs-on: ubuntu-latest
    needs: [precheck_state_bucket, terraform_infra_destroy]
    env:
      TF_STATE_BUCKET: ${{ needs.precheck_state_bucket.outputs.tf_state_bucket }}

    steps:
      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Delete state bucket (contents + bucket)
        shell: bash
        run: |
          set -euo pipefail

          BUCKET="gs://${TF_STATE_BUCKET}"

          if gcloud storage buckets describe "$BUCKET" >/dev/null 2>&1; then
            echo "Deleting bucket + all contents: $BUCKET"
            gcloud storage rm -r "$BUCKET" || true

            if gcloud storage buckets describe "$BUCKET" >/dev/null 2>&1; then
              echo "Bucket still exists after rm -r; deleting explicitly."
              gcloud storage buckets delete "$BUCKET" || true
            else
              echo "Bucket already deleted."
            fi
          else
            echo "Bucket not found (already deleted): $BUCKET"
          fi
